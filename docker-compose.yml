services:
  db:
    image: postgres:16-alpine
    container_name: esg_db_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: esg1234
      POSTGRES_DB: esg_platform
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - esg-network

  backend:
    build:
      context: ./backend
    container_name: esg_backend
    restart: always
    ports:
      - "8001:8000"
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      DATABASE_URL: postgresql://postgres:esg1234@db:5432/esg_platform
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      FRONTEND_URL: ${FRONTEND_URL}
      REACT_URL: ${FRONTEND_URL}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - esg-network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_FASTAPI_URL: ${VITE_APP_FASTAPI_URL}
    container_name: esg_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - esg-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

networks:
  esg-network:
    driver: bridge

volumes:
  postgres_data: